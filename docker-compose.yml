services:
  postgres:
    image: postgres:16-alpine
    container_name: vaku-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vaku}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - vaku_postgres_data:/var/lib/postgresql/data
      - ./dataBase/vaku_bd.sql:/docker-entrypoint-initdb.d/01_vaku_bd.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  vaku_postgres_data:
